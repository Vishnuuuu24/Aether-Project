name: patient-copilot

networks:
  hasa-net: {}

volumes:
  pgdata: {}
  qdrant_storage: {}
  minio_data: {}

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hasa
      POSTGRES_USER: hasa
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - ./volumes/pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks: [hasa-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hasa"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - ./volumes/qdrant_storage:/qdrant/storage
    ports:
      - "6333:6333"
    networks: [hasa-net]

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks: [hasa-net]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks: [hasa-net]

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    environment:
      DATABASE_URL: postgresql://hasa:${PG_PASSWORD}@postgres:5432/hasa
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks: [hasa-net]

  # ---------------------------------------------------------------------
  # GPU profile: ONLY valid on a Linux + NVIDIA host (e.g. the H200 slice).
  # Do NOT enable on macOS — Metal cannot be passed into containers.
  # On macOS, run the model via mlx-lm on the host instead (docs/08 §2b)
  # and point LLM_GATEWAY_BASE_URL at it.
  # ---------------------------------------------------------------------
  vllm:
    image: vllm/vllm-openai:latest
    profiles: ["gpu"]
    command: >
      --model Qwen/Qwen3.6-35B-A3B --quantization fp8
      --max-model-len 32768 --gpu-memory-utilization 0.90
    ports:
      - "8000:8000"
    networks: [hasa-net]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: ["gpu"]
